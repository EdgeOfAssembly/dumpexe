; Overrides for headless/agent automation (use after dosbox-staging.conf).
;   dosbox --conf dosbox-staging.conf --conf dosbox-auto.conf . -c "ICON.EXE" -exit

[cpu]
; Faster than default 3000 — particle intro is slow otherwise.
; auto_icon.sh also sets: -c "cycles fixed $CYCLES" (default 100000).
cycles = fixed 100000

[debugtrace]
; -c "ICON.EXE" is not an interactive prompt EXEC — allow dumps/trace anyway.
trace_on_interactive_exec_only = false

[sdl]
; Prefer a normal window so xdotool can find/focus it.
fullscreen = false

; Real gameplay PNGs (not B800 dumps). auto_icon.sh fires Ctrl+F5 / Alt+F5.
; Files land under ICON/capture/ (cwd when launched from ICON/).
[capture]
capture_dir = capture
; rendered = what you see; upscaled = integer scale; raw = framebuffer
default_image_capture_formats = rendered,upscaled

; Ensure agent socket is on for automated runs (same defaults as dosbox-staging.conf).
[controlsocket]
enabled     = true
path        = /tmp/dosbox-control.sock
pidfile     = /tmp/dosbox-control.pid
key_hold_ms = 30

[debugoverlay]
enabled     = true
force_cols  = 40
force_rows  = 25
