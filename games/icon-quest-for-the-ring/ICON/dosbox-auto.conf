; Overrides for headless/agent automation (use after dosbox-staging.conf).
;   dosbox --conf dosbox-staging.conf --conf dosbox-auto.conf . -c "ICON.EXE" -exit

[cpu]
; Faster than default 3000 — particle intro is slow otherwise.
; auto_icon.sh also sets: -c "cycles fixed $CYCLES" (default 100000).
cycles = fixed 100000

[debugtrace]
; -c "ICON.EXE" is not an interactive prompt EXEC — allow dumps/trace anyway.
trace_on_interactive_exec_only = false

[sdl]
; Prefer a normal window so xdotool can find/focus it.
fullscreen = false
