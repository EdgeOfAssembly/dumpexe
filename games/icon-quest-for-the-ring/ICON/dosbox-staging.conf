[debugtrace]
enabled = true
logfile = game_trace.log
trace_instructions = false
trace_interrupts = true
trace_file_io = true
trace_video_modes = true
auto_trace_on_exec = true
trace_on_interactive_exec_only = true
exclude_interrupts = 08,1C,09,0A,0B,0C,0D,0E,0F,70,71,72,73,74,75,76,77
file_read_hex_dump_bytes = 256
instruction_sample_rate = 1
max_log_size_mb = 50
deduplicate_interrupts = true
dedup_interrupt_window_ms = 50
deduplicate_instructions = false
dedup_instruction_max_consecutive = 3
binary_opcode_dump = true
binary_opcode_dump_game_only = true

; VRAM dumps: auto on mode switch + configurable hotkey
; Hotkey: ctrl+f10 (default). Do NOT use ctrl+f9 (DOSBox Shutdown).
; Files: screen_dumps/ICON_gNNNN_mMM_bB8000_s07D0_NNNN.bin (+ .meta)
screen_dump = true
screen_dump_dir = screen_dumps
screen_dump_on_mode_set = true
screen_dump_on_mode_set_delay_ms = 50
screen_dump_full_16k = false
screen_dump_write_meta = true
screen_dump_hotkey = ctrl+f10
